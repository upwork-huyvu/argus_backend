# Mosquitto config for LOCAL DEV ONLY.
# Anonymous access — do NOT use in pilot/production. Before pilot: per-controller
# credentials + ACLs (clientId == controllerId) + TLS listener on 8883.

listener 1883
allow_anonymous true

# Optional WebSocket listener (handy for MQTT Explorer / browser tooling).
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice
log_type information
